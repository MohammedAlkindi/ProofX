name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check codebase/
      - run: ruff format --check codebase/

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install mypy numpy scipy
          pip install --no-deps mpmath sympy networkx plotly matplotlib
      - run: mypy codebase/ --ignore-missing-imports --no-error-summary

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install numpy scipy scikit-learn mpmath sympy networkx

      - name: Run tests
        run: pytest --cov=codebase --cov-report=xml -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  falsification-smoke:
    name: FalsificationEngine smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install numpy scipy scikit-learn mpmath sympy
      - name: Run small-budget search (both conjectures)
        run: |
          python codebase/FalsificationEngine/FalsificationEngine.py \
            --budget 20 --seed 0 --target both --top-k 3
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Verify --output-json flag
        run: |
          python codebase/FalsificationEngine/FalsificationEngine.py \
            --budget 10 --seed 1 --target goldbach \
            --output-json /tmp/smoke_result.json
          python -c "import json,sys; d=json.load(open('/tmp/smoke_result.json')); sys.exit(0 if 'stats' in d else 1)"
        env:
          PYTHONPATH: ${{ github.workspace }}
