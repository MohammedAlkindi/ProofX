[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--cov=codebase",
    "--cov-report=term-missing",
    "--cov-report=xml:coverage.xml",
    "--cov-fail-under=60",
    "-v",
]

[tool.coverage.run]
source = ["codebase"]
omit = [
    "tests/*",
    "*/__init__.py",
    "*/results/*",
    "codebase/CollatzX/Bifurcation/*",
    "codebase/CollatzX/Boundary/*",
    "codebase/CollatzX/Pipeline/*",
    "codebase/CollatzX/PrimeGraph/*",
    "codebase/CollatzX/Processing/*",
    "codebase/CollatzX/RareEvent/*",
    "codebase/GoldbachX/GoldbachReasoner/*",
    "codebase/GoldbachX/MetaVariant/*",
    "codebase/GoldbachX/SequenceGenerator/*",
    "codebase/ReimannX/ContourTruth/*",
    "codebase/ReimannX/PrimeEchos/*",
    "codebase/ReimannX/TuringThreshold/*",
    "codebase/ReimannX/ZeroProperties/*",
    "codebase/ReimannX/ZetaMirror/*",
    "codebase/cli.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "def main\\(",
]

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
disallow_untyped_defs = false
check_untyped_defs = true
no_implicit_optional = true
exclude = [
    "tests/",
    "docs/",
    "packages/germinal/",
    "codebase/CollatzX/Bifurcation/",
    "codebase/CollatzX/Boundary/",
    "codebase/CollatzX/Pipeline/",
    "codebase/CollatzX/PrimeGraph/",
    "codebase/CollatzX/Processing/",
    "codebase/CollatzX/RareEvent/",
    "codebase/GoldbachX/GoldbachReasoner/",
    "codebase/GoldbachX/MetaVariant/",
    "codebase/GoldbachX/SequenceGenerator/",
    "codebase/ReimannX/ContourTruth/",
    "codebase/ReimannX/PrimeEchos/",
    "codebase/ReimannX/TuringThreshold/",
    "codebase/ReimannX/ZeroProperties/",
    "codebase/ReimannX/ZetaMirror/",
    "codebase/cli.py",
]

[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [
    "packages/germinal",
    "codebase/CollatzX/Bifurcation",
    "codebase/CollatzX/Boundary",
    "codebase/CollatzX/Pipeline",
    "codebase/CollatzX/PrimeGraph",
    "codebase/CollatzX/Processing",
    "codebase/CollatzX/RareEvent",
    "codebase/GoldbachX/GoldbachReasoner",
    "codebase/GoldbachX/MetaVariant",
    "codebase/GoldbachX/SequenceGenerator",
    "codebase/ReimannX/ContourTruth",
    "codebase/ReimannX/PrimeEchos",
    "codebase/ReimannX/TuringThreshold",
    "codebase/ReimannX/ZeroProperties",
    "codebase/ReimannX/ZetaMirror",
]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
ignore = [
    "E501",   # line-length — handled by formatter
    "N802",   # function name should be lowercase (math code uses uppercase)
    "N803",   # argument name should be lowercase
    "N806",   # variable in function should be lowercase
    "N999",   # invalid module name — engine modules intentionally mirror their package name
    "B007",   # loop variable not used
    "SIM108", # ternary operator suggestion
]

[tool.ruff.lint.per-file-ignores]
"codebase/FalsificationEngine/FalsificationEngine.py" = ["E402"]
"codebase/FalsificationEngine/RiemannFalsifier.py" = ["E402"]
"tests/*" = ["S101", "E402"]  # assert and import-after-skip are fine in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
