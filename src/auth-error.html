<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign-in issue · ProofX</title>
  <link rel="stylesheet" href="/error-pages.css">
</head>
<body>
  <header><div class="container"><a class="brand" href="/"><span class="brand-mark">PX</span> ProofX</a></div></header>
  <main>
    <section class="card"><div class="inner">
      <span class="badge">Authentication</span>
      <h1 style="font-size:clamp(34px,6vw,56px)">We couldn't complete Google sign-in</h1>
      <p id="friendly">Please try again in a moment. If this keeps happening, contact support.</p>
      <div class="hint" id="hint">Tip: You can return to the homepage and retry sign-in.</div>
      <div class="actions" style="margin-top:16px">
        <a class="btn primary" href="/">Back to Home</a>
        <a class="btn" href="/contact">Contact Support</a>
      </div>
    </div></section>
  </main>
  <footer>© <span id="y"></span> ProofX</footer>
  <script>
    document.getElementById('y').textContent=new Date().getFullYear();
    const params = new URLSearchParams(window.location.search);
    const raw = (params.get('message') || params.get('error_description') || params.get('error') || '').toLowerCase();
    if (raw.includes('supabase_url') || raw.includes('supabase_anon_key') || raw.includes('missing env vars')) {
      document.getElementById('friendly').textContent = 'Sign-in is temporarily unavailable due to a server configuration issue. This is not your fault.';
      document.getElementById('hint').innerHTML = 'For maintainers: set <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code>, then redeploy.';
    }
  </script>
</body>
</html>
